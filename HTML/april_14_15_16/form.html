<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp Form</title>
    <link rel="stylesheet" href="./form.css">
</head>

<body>
    <h2>Hi, User Please SignUp Here</h2>
    <form method="get" action="">
        <div class="form-field">
            <label for="fullName" class="input-label">
                Enter Full Name<span class="comp">*</span> :
            </label>
            <input type="text" id="fullName" name="fullname" placeholder="Enter Full Name" autocomplete="off" required />
        </div>

        <div class="form-field">
            <label for="userEmail" class="input-label">Enter Your Email<span class="comp">*</span> :</label>
            <input type="email" id="userEmail" name="email" placeholder="Enter Valid Email" required />
        </div>

        <div class="form-field">
            <label for="contact" class="input-label">Enter Mobile Number<span class="comp">*</span> :</label>

            <input type="text" value="91" readonly size="1" style="margin-right: 10px;"/>

            <input 
                type="tel" 
                id="contact" 
                placeholder="Enter Valid Mobile Number" 
                name="contact" 
                pattern="[6789]{1}[0-9]{9}" 
                required />
        </div>


        <div class="form-field">
            <label for="password" class="input-label">Enter Password<span class="comp">*</span> :</label>
            <input type="password" id="password" name="password" placeholder="Enter Valid Password" required />
        </div>
        <div class="form-field">
            <label for="dateofbirth" class="input-label">
                Select Date of Birth<span class="comp">*</span> :
            </label>
            <input type="date" id="dateofbirth" name="birthdate" required />
        </div>
        <div class="form-field">
            <label for="gender" class="input-label">Select Gender<span class="comp">*</span> :</label>

            <input type="radio" name="gender" id="male" value="male" required />
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" value="female" required />
            <label for="female">Female</label>

            <input type="radio" name="gender" id="other" value="other" required />
            <label for="other">Other</label>

        </div>
        <div class="form-field">
            <label for="city" class="input-label">Select City<span class="comp">*</span> :</label>
            <select name="city" id="city" required>
                <option value="">Select Current City</option>
                <option value="Pune" selected>Pune</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Surat">Surat</option>
                <option value="Indore">Indore</option>
                <option value="Nagpur">Nagpur</option>
            </select>
        </div>
        <div class="form-field">
            <label class="input-label" for="address">Enter Address<span class="comp">*</span> :</label>
            <textarea id="address" rows="5" cols="25" placeholder="Enter Current Address" name="address" required>
            </textarea>
        </div>

        <div class="form-field">
            <label class="input-label" for="education">Select Education<span class="comp">*</span> :</label>

            <input type="checkbox" id="ssc" name="education" value="SSC" checked /> 
            <label for="ssc">SSC</label>

            <input type="checkbox" id="hsc" name="education" value="HSC" /> 
            <label for="hsc">HSC</label>

            <input type="checkbox" id="bca" name="education" value="BCA" /> 
            <label for="bca">BCA</label>

            <input type="checkbox" id="BE/BTech" name="education" value="BE/BTech" /> 
            <label for="BE/BTech">BE/BTech</label>

            <input type="checkbox" id="mba" name="education" value="MBA" /> 
            <label for="mba">MBA</label>

            <input type="checkbox" id="diploma" name="education" value="Diploma" /> 
            <label for="diploma">Diploma</label>

            <input type="checkbox" id="phd" name="education" value="Phd" /> 
            <label for="phd">Phd</label>
            
            
        </div>

        <div class="form-field">
            <label class="input-label" for="file">Upload Resume/CV<span class="comp">*</span> :</label>

            <input type="file" accept=".pdf, .jpg,.png" multiple name="fileLocation"/>
        </div>

        <div class="form-field">
            <button type="submit">Register</button>
            <!-- <input type="submit" value="SignUp"/> -->
        </div>
    </form>
</body>
</html>
