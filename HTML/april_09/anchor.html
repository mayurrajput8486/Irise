<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Anchor Tag</title>
</head>

<body>
    <h2>Anchor tag with external link</h2>
    <!-- External Link -->
    <a href="https://en.wikipedia.org/wiki/Virat_Kohli" target="_blank" title="click here">click here - virat kohli</a>

    <br>
    <a href="https://en.wikipedia.org/wiki/Rohit_Sharma" target="_black" title="click here for more info">click here -
        Rohit Sharma</a>

    <h2>Anchor tag with download feature</h2>

    <a href="./InterviewQuestion.pdf" download="interview.zip">
        <button>Download Interview Que</button>
    </a>

    <button>
        <a style="text-decoration: none; color: black;" href="./hospital.zip" download="hos.pdf">Download Hospital Project</a>
    </button>

    <!-- Custom name file download -->
    <a href="./Mayur_Rajput_Resume_2026.docx" >
         <button>Download Resume</button>
    </a>
   
</body>
</html>
