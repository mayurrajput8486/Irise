<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe tag</title>
</head>
<body>
    <h2>Add Google Map in HTML Document</h2>
    <h3>Click here direction</h3>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3777.7976929338497!2d73.51143527496916!3d18.762571482378544!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2abb216646867%3A0x13c74f32bdfc2c55!2sWet%E2%80%99nJoy%20Water%20Park%20%26%20Amusement%20Park!5e0!3m2!1sen!2sin!4v1776081415340!5m2!1sen!2sin" width="400" height="300" style="border:2px solid; border-radius: 10px;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

    <h2>YouTube Videos</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/HzM_NBmD0p8?si=KCeHbeBPzuw7aJfm" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/gKBfgKmqQjA?si=OhNBKu0w3dm9uLE-" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <!-- Open another html document in current document -->
     <iframe src="https://irisesoft.in/"></iframe>
     <br>
    <iframe src="https://www.tpointtech.com/" width="750px" height="500px"></iframe>
</body>
</html>
