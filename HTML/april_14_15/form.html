<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp Form</title>
    <link rel="stylesheet" href="./form.css">
</head>

<body>
    <h2>Hi, User Please SignUp Here</h2>
    <form method="get" action="">
        <div class="form-field">
            <label for="fullName" class="input-label">
                Enter Full Name<span class="comp">*</span> :
            </label>
            <input 
                type="text" 
                id="fullName" 
                name="fullname" placeholder="Enter Full Name" required 
               
            />
        </div>

        <div class="form-field">
            <label for="userEmail" class="input-label">Enter Your Email<span class="comp">*</span> :</label>
            <input 
                type="email"
                id="userEmail" 
                name="email" placeholder="Enter Valid Email" 
                required
               
            />
        </div>
        <div class="form-field">
            <label for="password" class="input-label">Enter Password<span class="comp">*</span> :</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Enter Valid Password" required 
            />
        </div>
        <div class="form-field">
            <label for="dateofbirth" class="input-label">
                Select Date of Birth<span class="comp">*</span> :
            </label>
            <input 
                type="date" 
                id="dateofbirth"
                name="birthdate" 
                required 
            />
        </div>
        <div class="form-field">
            <label for="gender" class="input-label">Select Gender<span class="comp">*</span> :</label>

            <input 
                type="radio" 
                name="gender" 
                id="male"
                value="male"
                required
            />
            <label for="male">Male</label>

            <input 
                type="radio" 
                name="gender" 
                id="female"
                value="female"
                required
            />
            <label for="female">Female</label>

            <input
                type="radio" 
                name="gender" 
                id="other"
                value="other"
                required
            />
            <label for="other">Other</label>
            
        </div>
        <div class="form-field">
            <label for="city" class="input-label">Select City<span class="comp">*</span> :</label>
            <select name="city" id="city" required>
                <option value="">Select Current City</option>
                <option value="Pune" selected>Pune</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Surat">Surat</option>
                <option value="Indore">Indore</option>
                <option value="Nagpur">Nagpur</option>
            </select>
        </div>
        <div class="form-field">
            <label class="input-label" for="address">Enter Address<span class="comp">*</span> :</label>
            <textarea 
                id="address" 
                rows="5" 
                cols="25" 
                placeholder="Enter Flat no, floor no, society name, landmark etc" 
                required>
            </textarea>
        </div>
        <div class="form-field">
            <button type="submit">Register</button>
            <!-- <input type="submit" value="SignUp"/> -->
        </div>
    </form>
</body>
</html>
